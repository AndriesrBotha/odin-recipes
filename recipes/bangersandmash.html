<h2>A SIMPLE AND SAVOURY DISH</h2>
<p>Bangers and mash, also known as sausages and mash, is a traditional British dish, consisting
     of sausages served with mashed potatoes. It may consist of one of a variety of flavoured
      sausages made of pork, lamb, or beef</p>
